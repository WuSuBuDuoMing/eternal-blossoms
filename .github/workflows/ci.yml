name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate Data & Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate cards.json is valid JSON
        run: |
          node -e "
            const fs = require('fs');
            try {
              const data = JSON.parse(fs.readFileSync('data/cards.json', 'utf-8'));
              if (!Array.isArray(data)) {
                console.error('cards.json must be a JSON array');
                process.exit(1);
              }
              console.log('cards.json is valid (' + data.length + ' cards)');
            } catch (e) {
              console.error('Failed to parse cards.json:', e.message);
              process.exit(1);
            }
          "

      - name: Check required JS files exist
        run: |
          required_files=(
            "server.js"
            "routes/api.js"
            "public/js/app.js"
            "public/js/scene.js"
            "public/js/particles.js"
            "public/js/layouts.js"
            "public/js/ui.js"
            "public/js/audio.js"
            "public/js/analytics.js"
            "public/js/register-sw.js"
            "public/js/vendor/three.min.js"
          )
          missing=0
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=$((missing + 1))
            else
              echo "OK: $f"
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing required file(s) missing"
            exit 1
          fi
          echo "All required files present."

  build:
    name: Build & Health Check
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        node-version: [22]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Start server and health check
        run: |
          node server.js &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Wait for server to be ready (up to 30 seconds)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3002/ > /dev/null 2>&1; then
              echo "Server is up after ${i}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "::error::Server process exited prematurely"
              exit 1
            fi
            sleep 1
          done

          # Health check: verify HTML response
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3002/)
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Health check failed with HTTP $HTTP_CODE"
            kill $SERVER_PID
            exit 1
          fi
          echo "Health check passed (HTTP $HTTP_CODE)"

          # Health check: verify API endpoint
          API_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3002/api/cards)
          if [ "$API_CODE" -ne 200 ]; then
            echo "::error::API check failed with HTTP $API_CODE"
            kill $SERVER_PID
            exit 1
          fi
          echo "API check passed (HTTP $API_CODE)"

          kill $SERVER_PID
          echo "Build and health check completed successfully."
