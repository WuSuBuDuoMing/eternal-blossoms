version: "3.8"

services:
  eternal-blossoms:
    build: .
    container_name: eternal-blossoms
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - CORS_ORIGIN=*
      - BODY_LIMIT=10mb
    restart: unless-stopped
    # v1.16.0: Resource limits for production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
